services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: clawscale
      POSTGRES_PASSWORD: clawscale
      POSTGRES_DB: clawscale
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clawscale"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4040:4040"
      - "4041:4041"
    environment:
      DATABASE_URL: postgresql://clawscale:clawscale@db:5432/clawscale
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-string-in-production}
      HOST: 0.0.0.0
      PORT: 4041
      CORS_ORIGIN: http://localhost:4040
      NEXT_PUBLIC_API_URL: http://localhost:4041
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    env_file:
      - path: .env
        required: false

volumes:
  pgdata:
